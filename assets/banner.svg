    <rect x="735" y="298" width="150" height="50" rx="25" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="810" y="330" text-anchor="middle" fill="#3b82f6">rights</text>
  </g>
  <text x="640" y="384" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#6e7681">Roles &#183; lawful basis &#183; breach 72h &#183; transfers &#183; Garante &#183; a Claude Code skill</text>
