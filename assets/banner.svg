  <text x="640" y="205" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2" fill="url(#word)">gdpr-compliance</text>
  <text x="640" y="256" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" font-weight="400" fill="#8b949e">Map it, surface the gaps, prepare the docs. Cite the source. Not legal advice.</text>
